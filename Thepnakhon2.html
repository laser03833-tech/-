<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>มหาวิทยาลัยเทพนคร</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
padding:30px;
margin:40px auto;
border-radius:12px;
max-width:500px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
color:#cc6600;
}

input,select{
padding:12px;
margin:10px;
width:90%;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
padding:14px 20px;
background:#ff8800;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ff7700;
}

.result{
margin-top:20px;
font-size:18px;
color:green;
}

</style>
</head>

<body>

<div class="container">

<h1>มหาวิทยาลัยเทพนคร</h1>
<h3>ระบบสมัครเข้าศึกษา</h3>

<input id="name" placeholder="ชื่อ - นามสกุลผู้สมัคร">

<select id="faculty" onchange="updateMajor()">

<option value="">เลือกคณะ</option>

<option value="engineering">คณะวิศวกรรมศาสตร์</option>
<option value="communication">คณะนิเทศศาสตร์</option>
<option value="business">คณะบริหารธุรกิจ</option>
<option value="film">คณะดิจิทัลมีเดียและศิลปะภาพยนตร์</option>
<option value="psychology">คณะจิตวิทยา</option>
<option value="medical">คณะแพทยศาสตร์</option>

</select>

<select id="major">

<option>เลือกสาขา</option>

</select>

<button onclick="applyForm()">ส่งใบสมัคร</button>

<div class="result" id="result"></div>

</div>

<script>

function updateMajor(){

let faculty=document.getElementById("faculty").value
let major=document.getElementById("major")

major.innerHTML=""

if(faculty=="engineering"){

major.innerHTML+=`<option>วิศวกรรมไฟฟ้า</option>`
major.innerHTML+=`<option>วิศวกรรมโยธา</option>`

}

if(faculty=="communication"){

major.innerHTML+=`<option>ศิลปะการแสดง</option>`
major.innerHTML+=`<option>การผลิตอีเว้นท์และการจัดการนิทรรศการ</option>`

}

if(faculty=="business"){

major.innerHTML+=`<option>การออกแบบและการบริหารแฟชั่น</option>`
major.innerHTML+=`<option>การวางแผนการเงินและการลงทุน</option>`

}

if(faculty=="film"){

major.innerHTML+=`<option>ภาพยนตร์</option>`

}

if(faculty=="psychology"){

major.innerHTML+=`<option>จิตวิทยา</option>`

}

if(faculty=="medical"){

major.innerHTML+=`<option>แพทยศาสตร์</option>`
major.innerHTML+=`<option>สัตวแพทยศาสตร์</option>`

}

}

function applyForm(){

let name=document.getElementById("name").value
let faculty=document.getElementById("faculty").value
let major=document.getElementById("major").value

if(name==""||faculty==""){

alert("กรุณากรอกข้อมูลให้ครบ")
return

}

let id="TNK-"+Math.floor(Math.random()*9000+1000)

let student={

id:id,
name:name,
faculty:faculty,
major:major,
status:"กำลังพิจารณา"

}

localStorage.setItem(id,JSON.stringify(student))

document.getElementById("result").innerHTML=
"สมัครสำเร็จ!<br>รหัสผู้สมัคร: <b>"+id+"</b>"

}

</script>

</body>
  </html>
