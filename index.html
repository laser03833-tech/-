<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสมัครเรียน มหาวิทยาลัยเทพนคร</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f0f2f5;
}

header{
background:#004aad;
color:white;
padding:20px;
text-align:center;
}

header img{
width:80px;
}

header h1{
margin:10px 0 0 0;
font-size:26px;
}

.container{
max-width:800px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#333;
}

form{
display:grid;
gap:15px;
margin-top:20px;
}

label{
font-weight:bold;
}

input, select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:20px;
padding:12px;
background:#004aad;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#00337a;
}

footer{
text-align:center;
padding:20px;
color:#777;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<img src="logo.png">

<h1>มหาวิทยาลัยเทพนคร</h1>

<p>ระบบสมัครเรียนออนไลน์</p>

</header>

<div class="container">

<h2>แบบฟอร์มสมัครเรียน</h2>

<form>

<label>ชื่อ - นามสกุล</label>
<input type="text" placeholder="กรอกชื่อของคุณ">

<label>เลขบัตรประชาชน</label>
<input type="text" placeholder="13 หลัก">

<label>อีเมล</label>
<input type="email" placeholder="example@email.com">

<label>เบอร์โทรศัพท์</label>
<input type="text" placeholder="08xxxxxxxx">

<label>คณะ / สาขาวิชาที่ต้องการสมัคร</label>

<select>

<option>คณะวิศวกรรมศาสตร์ - สาขาวิชาวิศวกรรมไฟฟ้า</option>
<option>คณะวิศวกรรมศาสตร์ - สาขาวิชาวิศวกรรมเครื่องกล</option>
<option>คณะวิศวกรรมศาสตร์ - สาขาวิชาวิศวกรรมโยธา</option>

<option>คณะเทคโนโลยีสารสนเทศ - สาขาวิชาวิทยาการคอมพิวเตอร์</option>
<option>คณะเทคโนโลยีสารสนเทศ - สาขาวิชาวิศวกรรมซอฟต์แวร์</option>

<option>คณะบริหารธุรกิจ - สาขาการตลาด</option>
<option>คณะบริหารธุรกิจ - สาขาการจัดการ</option>

<option>คณะนิเทศศาสตร์ - สาขาสื่อดิจิทัล</option>
<option>คณะครุศาสตร์ - สาขาการศึกษาปฐมวัย</option>

</select>

<label>วุฒิการศึกษาสูงสุด</label>

<select>

<option>มัธยมศึกษาปีที่ 6</option>
<option>ปวช.</option>
<option>ปวส.</option>

</select>

<button type="submit">สมัครเรียน</button>

</form>

</div>

<footer>

© 2026 มหาวิทยาลัยเทพนคร

</footer>

</body>
  </html>
