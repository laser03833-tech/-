<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>มหาวิทยาลัยเทพนคร</title>

<style>

body{
font-family:tahoma;
background:#f4f4f4;
margin:0;
}

.title{
text-align:center;
font-size:28px;
color:#b30000;
margin-top:40px;
font-weight:bold;
}

.card{
background:white;
width:90%;
max-width:420px;
margin:20px auto;
padding:25px;
border-radius:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:16px;
margin:10px 0;
border-radius:14px;
border:2px solid #ddd;
font-size:18px;
}

select{
border:3px solid #b30000;
}

button{
width:100%;
padding:16px;
margin-top:15px;
background:#b30000;
color:white;
font-size:20px;
border:none;
border-radius:14px;
}

.list{
width:90%;
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.list h3{
color:#b30000;
margin-top:10px;
}

/* portfolio */

.port{
text-align:center;
padding:30px;
}

.time{
font-size:18px;
margin:10px;
}

</style>
</head>

<body>

<div id="applyPage">

<div class="title">
ระบบการสมัครเข้าเป็นนักศึกษา<br>
มหาวิทยาลัยเทพนคร
</div>

<div class="card">

<input id="name" placeholder="ชื่อ - นามสกุล">

<input id="school" placeholder="โรงเรียนเดิม">

<select id="faculty" onchange="changeMajor()">
<option value="">เลือกคณะ</option>

<option value="engineer">คณะวิศวกรรมศาสตร์</option>
<option value="comm">คณะนิเทศศาสตร์</option>
<option value="business">คณะบริหารธุรกิจ</option>
<option value="film">คณะดิจิทัลมีเดียและภาพยนตร์</option>
<option value="psy">คณะจิตวิทยา</option>
<option value="med">คณะแพทยศาสตร์</option>

</select>

<select id="major">
<option>เลือกสาขา</option>
</select>

<button onclick="apply()">สมัคร</button>

</div>

<div class="list">

<h3>รายชื่อผู้สมัคร</h3>

<div id="applicants"></div>

</div>

</div>

<div id="portfolioPage" style="display:none" class="port">

<h2 style="color:#b30000">ยืนยันสิทธิ์เรียบร้อยแล้ว</h2>

<div class="time" id="time"></div>

<p><b>ผู้สมัคร:</b> <span id="pname"></span></p>
<p><b>โรงเรียน:</b> <span id="pschool"></span></p>
<p><b>คณะ:</b> <span id="pfaculty"></span></p>
<p><b>สาขา:</b> <span id="pmajor"></span></p>

</div>

<script>

let majors={

engineer:[
"วิศวกรรมไฟฟ้า",
"วิศวกรรมโยธา"
],

comm:[
"ศิลปะการแสดง",
"การผลิตอีเว้นท์และการจัดนิทรรศการ"
],

business:[
"การออกแบบและการบริหารแฟชั่น",
"การวางแผนการเงินและการลงทุน"
],

film:[
"ภาพยนตร์"
],

psy:[
"จิตวิทยา"
],

med:[
"แพทยศาสตร์",
"สัตวแพทยศาสตร์"
]

}

function changeMajor(){

let faculty=document.getElementById("faculty").value
let major=document.getElementById("major")

major.innerHTML=""

majors[faculty].forEach(m=>{
let option=document.createElement("option")
option.text=m
major.add(option)
})

}

let applicants=[]

function apply(){

let name=document.getElementById("name").value
let school=document.getElementById("school").value
let faculty=document.getElementById("faculty")
let facultyName=faculty.options[faculty.selectedIndex].text
let major=document.getElementById("major").value

if(name==""||school==""){
alert("กรอกข้อมูลให้ครบ")
return
}

applicants.push({name,faculty:facultyName})

showApplicants()

document.getElementById("applyPage").style.display="none"
document.getElementById("portfolioPage").style.display="block"

document.getElementById("pname").innerText=name
document.getElementById("pschool").innerText=school
document.getElementById("pfaculty").innerText=facultyName
document.getElementById("pmajor").innerText=major

startTime()

}

function showApplicants(){

let box=document.getElementById("applicants")
box.innerHTML=""

applicants.forEach(a=>{

box.innerHTML+=`
<p>${a.name} - ${a.faculty}</p>
`

})

}

function startTime(){

setInterval(()=>{

let now=new Date()

document.getElementById("time").innerText=
now.toLocaleDateString("th-TH")+" "+now.toLocaleTimeString("th-TH")

},1000)

}

</script>

</body>
  </html>
