<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครมหาวิทยาลัยเทพนคร</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
display:flex;
justify-content:center;
}

.wrapper{
width:100%;
max-width:420px;
}

/* ---------- หน้า สมัคร ---------- */

.formPage{
background:white;
padding:25px;
}

.title{
font-size:26px;
font-weight:bold;
text-align:center;
color:#b30000;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#c40000;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#a30000;
}

/* ---------- หน้า Portfolio ---------- */

.header{
display:flex;
}

.round{
background:#efe6d0;
width:70px;
text-align:center;
padding:15px;
color:#e59a00;
font-weight:bold;
}

.portfolio{
flex:1;
background:#f6a400;
color:white;
padding:15px;
font-size:22px;
}

.content{
padding:20px;
text-align:center;
background:#f4efe6;
}

.success{
font-size:26px;
font-weight:bold;
color:#1d4f7a;
}

.time{
margin:15px;
}

.card{
background:white;
border:2px solid #2ecc71;
border-radius:12px;
padding:20px;
text-align:left;
position:relative;
}

.check{
position:absolute;
top:0;
left:0;
background:#2ecc71;
color:white;
padding:6px 10px;
border-radius:0 0 10px 0;
}

.logo{
position:absolute;
right:15px;
top:15px;
width:65px;
opacity:0.7;
}

.more{
margin-top:20px;
cursor:pointer;
color:#666;
}

.detail{
display:none;
margin-top:10px;
}

</style>

<script>

const majors={

"วิศวกรรมศาสตร์":["วิศวะไฟฟ้า","วิศวะโยธา"],

"นิเทศศาสตร์":[
"ศิลปะการแสดง",
"การผลิตอีเว้นท์และการจัดการนิทรรศการ"
],

"บริหารธุรกิจ":[
"การออกแบบและการบริหารแฟชั่น",
"การวางแผนการเงินและการลงทุน"
],

"ดิจิทัลมีเดียและศิลปะภาพยนตร์":["ภาพยนตร์"],

"จิตวิทยา":["จิตวิทยา"],

"แพทยศาสตร์":["แพทยศาสตร์","สัตวแพทย์"]

}

function updateMajor(){

let faculty=document.getElementById("faculty").value
let majorSelect=document.getElementById("major")

majorSelect.innerHTML=""

majors[faculty].forEach(m=>{
let option=document.createElement("option")
option.text=m
majorSelect.add(option)
})

}

function submitForm(){

let fullname=document.getElementById("fullname").value
let school=document.getElementById("school").value
let faculty=document.getElementById("faculty").value
let major=document.getElementById("major").value

if(fullname==""||school==""){
alert("กรอกข้อมูลให้ครบ")
return
}

document.getElementById("formPage").style.display="none"
document.getElementById("resultPage").style.display="block"

document.getElementById("showName").innerText=fullname
document.getElementById("showSchool").innerText=school
document.getElementById("showFaculty").innerText="คณะ "+faculty
document.getElementById("showMajor").innerText="สาขา "+major

}

function toggleDetail(){

let d=document.getElementById("detail")

if(d.style.display=="block"){
d.style.display="none"
}else{
d.style.display="block"
}

}

</script>

</head>

<body>

<div class="wrapper">

<!-- ---------- หน้า สมัคร ---------- -->

<div class="formPage" id="formPage">

<div class="title">
สมัครมหาวิทยาลัยเทพนคร
</div>

<input id="fullname" placeholder="ชื่อ - นามสกุล">

<input id="school" placeholder="จบจากโรงเรียน">

<select id="faculty" onchange="updateMajor()">

<option value="วิศวกรรมศาสตร์">คณะวิศวกรรมศาสตร์</option>
<option value="นิเทศศาสตร์">คณะนิเทศศาสตร์</option>
<option value="บริหารธุรกิจ">คณะบริหารธุรกิจ</option>
<option value="ดิจิทัลมีเดียและศิลปะภาพยนตร์">คณะดิจิทัลมีเดียและศิลปะภาพยนตร์</option>
<option value="จิตวิทยา">คณะจิตวิทยา</option>
<option value="แพทยศาสตร์">คณะแพทยศาสตร์</option>

</select>

<select id="major"></select>

<button onclick="submitForm()">
ยืนยันการสมัคร
</button>

</div>

<!-- ---------- หน้า Portfolio ---------- -->

<div id="resultPage" style="display:none">

<div class="header">
<div class="round">รอบ<br>1</div>
<div class="portfolio">Portfolio</div>
</div>

<div class="content">

<div class="success">
ยืนยันสิทธิ์เรียบร้อยแล้ว
</div>

<div class="time">
14 ก.พ. 70 08:22:25 น.
</div>

<div class="card">

<div class="check">✔</div>

<img class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Seal_of_KMUTNB.png">

<b>มหาวิทยาลัยเทพนคร</b><br>
ปทุมธานี<br>
วิทยาเขตรังสิต<br>

<span id="showFaculty"></span><br>
<span id="showMajor"></span><br>

ภาคปกติ<br>
(หลักสูตรนานาชาติ)

</div>

<div class="more" onclick="toggleDetail()">
ข้อมูลเพิ่มเติม ▼
</div>

<div class="detail" id="detail">

ชื่อ - นามสกุล :
<span id="showName"></span>
<br>

สถานศึกษาเดิม :
<span id="showSchool"></span>

</div>

</div>

</div>

</div>

<script>
updateMajor()
</script>

</body>
</html>
