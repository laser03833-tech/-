<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สมัครเข้าเป็นนักศึกษา มหาวิทยาลัยเทพนคร</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:linear-gradient(180deg,#b30000,#ffffff);
min-height:100vh;
}

/* กล่องสมัคร */

.container{
max-width:420px;
margin:40px auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* หัวข้อ */

.title{
text-align:center;
color:#b30000;
font-size:22px;
font-weight:bold;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

/* ช่องกรอก */

input,select{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

/* ปุ่ม */

button{
width:100%;
padding:15px;
background:#c40000;
color:white;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#9c0000;
}

/* result */

.result{
display:none;
text-align:center;
padding:30px;
}

.card{
margin-top:20px;
background:white;
border-radius:15px;
padding:20px;
border:3px solid #2ecc71;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.time{
margin:10px 0;
color:#444;
}

</style>
</head>

<body>

<div class="container" id="formPage">

<div class="title">สมัครเข้าเป็นนักศึกษา</div>
<div class="subtitle">มหาวิทยาลัยเทพนคร</div>

<input id="fullname" placeholder="ชื่อ - นามสกุล">
<input id="school" placeholder="จบจากโรงเรียน">

<select id="faculty" onchange="updateMajor()">
<option value="">เลือกคณะ</option>
<option value="วิศวกรรมศาสตร์">คณะวิศวกรรมศาสตร์</option>
<option value="นิเทศศาสตร์">คณะนิเทศศาสตร์</option>
<option value="บริหารธุรกิจ">คณะบริหารธุรกิจ</option>
<option value="ดิจิทัลมีเดีย">คณะดิจิทัลมีเดียและศิลปะภาพยนตร์</option>
<option value="จิตวิทยา">คณะจิตวิทยา</option>
<option value="แพทยศาสตร์">คณะแพทยศาสตร์</option>
</select>

<select id="major">
<option>เลือกสาขา</option>
</select>

<button onclick="submitForm()">ยืนยันการสมัคร</button>

</div>

<div class="result" id="resultPage">

<h2 style="color:#2c6db2;">ยืนยันสิทธิ์เรียบร้อยแล้ว</h2>

<div class="time">
14 ก.พ. 70 08:22:25 น.
</div>

<div class="card">

<b>มหาวิทยาลัยเทพนคร</b><br>
ปทุมธานี<br>
วิทยาเขตรังสิต<br><br>

คณะ :
<span id="showFaculty"></span>
<br>

สาขา :
<span id="showMajor"></span>

<br><br>

ชื่อ - นามสกุล :
<span id="showName"></span>

<br>

สถานศึกษาเดิม :
<span id="showSchool"></span>

</div>

</div>

<script>

function updateMajor(){

let faculty=document.getElementById("faculty").value
let major=document.getElementById("major")

major.innerHTML=""

let majors=[]

if(faculty==="วิศวกรรมศาสตร์"){
majors=["สาขาวิศวะไฟฟ้า","สาขาวิศวะโยธา"]
}

if(faculty==="นิเทศศาสตร์"){
majors=["สาขาศิลปะการแสดง","สาขาการผลิตอีเว้นท์และการจัดการนิทรรศการ"]
}

if(faculty==="บริหารธุรกิจ"){
majors=["สาขาการออกแบบและการบริหาร แฟชั่น","สาขาการวางแผนการเงินและการลงทุน"]
}

if(faculty==="ดิจิทัลมีเดีย"){
majors=["สาขาภาพยนตร์"]
}

if(faculty==="จิตวิทยา"){
majors=["สาขาจิตวิทยา"]
}

if(faculty==="แพทยศาสตร์"){
majors=["สาขาแพทย์ศาสตร์","สาขาสัตว์แพทย์"]
}

majors.forEach(function(m){
let option=document.createElement("option")
option.text=m
major.add(option)
})

}

function submitForm(){

let name=document.getElementById("fullname").value
let school=document.getElementById("school").value
let faculty=document.getElementById("faculty").selectedOptions[0].text
let major=document.getElementById("major").value

document.getElementById("showName").innerText=name
document.getElementById("showSchool").innerText=school
document.getElementById("showFaculty").innerText=faculty
document.getElementById("showMajor").innerText=major

document.getElementById("formPage").style.display="none"
document.getElementById("resultPage").style.display="block"

}

</script>

</body>
</html>
