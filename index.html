<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสมัครเรียน มหาวิทยาลัยเทพนคร</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4efe6;
}

/* HEADER */

.header{
background:#f6a800;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:700px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#004aad;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00327a;
}

/* RESULT */

.result{
display:none;
max-width:700px;
margin:30px auto;
}

.card{
background:white;
border:3px solid #2ecc71;
border-radius:10px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
}

.check{
position:absolute;
top:0;
left:0;
background:#2ecc71;
color:white;
padding:5px 12px;
font-size:20px;
border-bottom-right-radius:10px;
}

.logo{
width:80px;
}

</style>

</head>

<body>

<div class="header">
Portfolio รอบ 1 - ระบบสมัครเรียน
</div>

<div class="container">

<h2>ใบสมัครเข้าศึกษา</h2>

<label>ชื่อ - นามสกุล</label>
<input type="text" id="name">

<label>จบการศึกษาจากโรงเรียน</label>
<input type="text" id="school">

<label>เลือกคณะ / สาขา</label>

<select id="major">

<option>คณะวิศวกรรมศาสตร์ - สาขาวิศวะไฟฟ้า</option>
<option>คณะวิศวกรรมศาสตร์ - สาขาวิศวะโยธา</option>

<option>คณะนิเทศศาสตร์ - สาขาศิลปะการแสดง</option>
<option>คณะนิเทศศาสตร์ - สาขาการผลิตอีเว้นท์และการจัดการนิทรรศการ</option>

<option>คณะบริหารธุรกิจ - สาขาการออกแบบและการบริหารแฟชั่น</option>
<option>คณะบริหารธุรกิจ - สาขาการวางแผนการเงินและการลงทุน</option>

<option>คณะดิจิทัลมีเดียและศิลปะภาพยนตร์ - สาขาภาพยนตร์</option>

<option>คณะจิตวิทยา - สาขาจิตวิทยา</option>

<option>คณะแพทยศาสตร์ - สาขาแพทยศาสตร์</option>
<option>คณะแพทยศาสตร์ - สาขาสัตวแพทย์</option>

</select>

<button onclick="apply()">สมัครเรียน</button>

</div>

<div class="result" id="result">

<div class="container">

<h2>ใบสมัครของคุณ</h2>

<p><b>ชื่อ :</b> <span id="rname"></span></p>

<p><b>จบจาก :</b> <span id="rschool"></span></p>

<p><b>คณะ / สาขา :</b> <span id="rmajor"></span></p>

<button onclick="confirm()">ยืนยันสิทธิ์เข้าศึกษา</button>

</div>

<div class="card">

<div class="check">✓</div>

<div>

<h3>มหาวิทยาลัยเทพนคร</h3>

<p>วิทยาเขตรังสิต</p>

<p id="rmajor2"></p>

<p>โครงการ Portfolio รอบ 1</p>

</div>

<img src="logo.png" class="logo">

</div>

</div>

<script>

function apply(){

let name=document.getElementById("name").value;
let school=document.getElementById("school").value;
let major=document.getElementById("major").value;

document.getElementById("rname").innerText=name;
document.getElementById("rschool").innerText=school;
document.getElementById("rmajor").innerText=major;
document.getElementById("rmajor2").innerText=major;

document.getElementById("result").style.display="block";

}

function confirm(){

alert("ยืนยันสิทธิ์เรียบร้อยแล้ว");

}

</script>

</body>
  </html>
