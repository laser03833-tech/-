<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>มหาวิทยาลัยเทพนคร</title>

<style>

body{
font-family:tahoma;
margin:0;
background:#f2f2f2;
}

/* header */

.header{
background:#b30000;
color:white;
text-align:center;
padding:25px;
font-size:24px;
font-weight:bold;
}

.subheader{
background:#c88a00;
color:white;
padding:15px;
font-size:20px;
}

/* form */

.card{
background:white;
width:90%;
max-width:420px;
margin:30px auto;
padding:25px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:15px;
margin:10px 0;
border-radius:12px;
border:2px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#b30000;
color:white;
border:none;
border-radius:12px;
font-size:18px;
}

/* portfolio */

.success{
text-align:center;
font-size:32px;
color:#2c4f7c;
margin-top:20px;
}

.time{
text-align:center;
font-size:18px;
margin-bottom:20px;
}

.box{
width:90%;
max-width:420px;
margin:auto;
background:white;
border-radius:14px;
border:3px solid #2f7f4f;
padding:20px;
}

.box b{
display:block;
margin-top:10px;
}

</style>
</head>

<body>

<div id="applyPage">

<div class="header">
ระบบสมัครเข้าศึกษาระดับปริญญาตรี
</div>

<div class="subheader">
รอบ 1 Portfolio
</div>

<div class="card">

<input id="name" placeholder="ชื่อ - นามสกุล">
<input id="school" placeholder="โรงเรียนเดิม">

<select id="faculty" onchange="changeMajor()">

<option value="">เลือกคณะ</option>

<option value="eng">คณะ วิศวกรรมศาสตร์</option>
<option value="com">คณะ นิเทศศาสตร์</option>
<option value="bus">คณะ บริหารธุรกิจ</option>
<option value="film">คณะดิจิทัลมีเดียและศิลปะภาพยนตร์</option>
<option value="psy">คณะจิตวิทยา</option>
<option value="med">คณะแพทยศาสตร์</option>

</select>

<select id="major">
<option>เลือกสาขา</option>
</select>

<button onclick="apply()">สมัคร</button>

</div>

</div>

<!-- portfolio -->

<div id="portfolioPage" style="display:none">

<div class="header">
ระบบสมัครเข้าศึกษาระดับปริญญาตรี
</div>

<div class="subheader">
รอบ 1 Portfolio
</div>

<div class="success">
ยืนยันสิทธิ์เรียบร้อยแล้ว
</div>

<div class="time" id="time"></div>

<div class="box">

<b>มหาวิทยาลัยเทพนคร</b>

จังหวัดปทุมธานี  
วิทยาเขตรังสิต  

<b>ผู้สมัคร</b>
<span id="pname"></span>

<b>โรงเรียนเดิม</b>
<span id="pschool"></span>

<b>คณะ</b>
<span id="pfaculty"></span>

<b>สาขา</b>
<span id="pmajor"></span>

</div>

</div>

<script>

let majors={

eng:[
"สาขาวิศวะไฟฟ้า",
"สาขาวิศวะโยธา"
],

com:[
"สาขาศิลปะการแสดง",
"สาขาการผลิตอีเว้นท์และการจัดการนิทรรศการ"
],

bus:[
"สาขาการออกแบบและการบริหาร แฟชั่น",
"สาขาการวางแผนการเงินและการลงทุน"
],

film:[
"สาขาภาพยนตร์"
],

psy:[
"สาขาจิตวิทยา"
],

med:[
"สาขาแพทย์ศาสตร์",
"สาขาสัตว์แพทย์"
]

}

function changeMajor(){

let faculty=document.getElementById("faculty").value
let major=document.getElementById("major")

major.innerHTML=""

majors[faculty].forEach(m=>{
let op=document.createElement("option")
op.text=m
major.add(op)
})

}

function formatThaiDate(){

let months=[
"ม.ค","ก.พ","มี.ค","เม.ย","พ.ค","มิ.ย",
"ก.ค","ส.ค","ก.ย","ต.ค","พ.ย","ธ.ค"
]

let d=new Date()

let day=d.getDate()
let month=months[d.getMonth()]
let year=(d.getFullYear()+543).toString().slice(-2)

let time=d.toLocaleTimeString("th-TH")

return day+" "+month+" "+year+" "+time

}

function startTime(){

setInterval(()=>{

document.getElementById("time").innerText=formatThaiDate()

},1000)

}

function apply(){

let name=document.getElementById("name").value
let school=document.getElementById("school").value
let faculty=document.getElementById("faculty")
let facultyName=faculty.options[faculty.selectedIndex].text
let major=document.getElementById("major").value

document.getElementById("applyPage").style.display="none"
document.getElementById("portfolioPage").style.display="block"

document.getElementById("pname").innerText=name
document.getElementById("pschool").innerText=school
document.getElementById("pfaculty").innerText=facultyName
document.getElementById("pmajor").innerText=major

startTime()

}

</script>

</body>
</html>
