<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบยืนยันสิทธิ์การเข้าศึกษา</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f3efe8;
}

/* HEADER */

header{
background:linear-gradient(135deg,#8b0000,#c40000);
color:white;
text-align:center;
padding:40px 20px;
}

header img{
width:110px;
margin-bottom:10px;
}

header h1{
margin:0;
font-size:28px;
}

header p{
margin:5px 0 0 0;
}

/* TITLE */

.title{
text-align:center;
margin-top:30px;
}

.title h2{
color:#1d3d6b;
margin-bottom:5px;
}

/* RESULT CARD */

.card{
background:white;
border:3px solid #2ecc71;
border-radius:12px;
max-width:650px;
margin:30px auto;
padding:25px;
position:relative;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.check{
position:absolute;
top:0;
left:0;
background:#2ecc71;
color:white;
padding:6px 14px;
font-size:20px;
border-bottom-right-radius:10px;
}

.card h3{
margin-top:0;
}

.info{
line-height:1.8;
font-size:17px;
}

.logo{
position:absolute;
right:20px;
top:20px;
width:80px;
}

</style>

</head>

<body>

<header>

<img src="logo.png">

<h1>มหาวิทยาลัยเทพนคร</h1>

<p>ระบบตรวจสอบสถานะการสมัครเรียน</p>

</header>

<div class="title">

<h2>ยืนยันสิทธิ์เรียบร้อยแล้ว</h2>

<p>05 ก.พ. 2568 08:22:25 น.</p>

</div>

<div class="card">

<div class="check">✓</div>

<img src="logo.png" class="logo">

<div class="info">

<b>รอบ Portfolio 1</b><br>

มหาวิทยาลัยเทพนคร<br>

ปทุมธานี<br>

วิทยาเขตรังสิต<br>

คณะวิศวกรรมศาสตร์<br>

สาขาวิศวะไฟฟ้า<br>

ภาคปกติ<br>

(หลักสูตรนานาชาติ)

</div>

</div>

</body>
</html>
