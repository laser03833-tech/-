<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครเข้าศึกษา</title>

<style>

body{
font-family:sans-serif;
background:#e6e1d9;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#2b6cb0;
}

.box{
background:white;
max-width:420px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#2bb673;
color:white;
font-size:16px;
cursor:pointer;
}

.card{
background:#efefef;
border:4px solid #2bb673;
border-radius:20px;
padding:20px;
max-width:420px;
margin:25px auto;
text-align:left;
position:relative;
}

.check{
position:absolute;
top:-15px;
left:-15px;
background:#2bb673;
color:white;
width:40px;
height:40px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.logo{
position:absolute;
right:20px;
top:20px;
width:60px;
}

.card p{
margin:3px 0;
}

.more{
margin-top:10px;
cursor:pointer;
color:#555;
}

.extra{
display:none;
background:#f2f2f2;
padding:10px;
border-radius:10px;
max-width:420px;
margin:auto;
text-align:left;
}

</style>
</head>

<body>

<!-- หน้าสมัคร -->
<div id="formPage">

<h1>ระบบสมัครเข้าศึกษา</h1>

<div class="box">

<input id="name" placeholder="ชื่อ - นามสกุล">

<input id="school" placeholder="สถานศึกษาเดิม">

<select id="faculty">
<option value="">เลือกคณะ</option>

<option value="วิศวกรรมศาสตร์|สาขาวิศวะไฟฟ้า">คณะวิศวกรรมศาสตร์ - สาขาวิศวะไฟฟ้า</option>
<option value="วิศวกรรมศาสตร์|สาขาวิศวะโยธา">คณะวิศวกรรมศาสตร์ - สาขาวิศวะโยธา</option>

<option value="นิเทศศาสตร์|สาขาศิลปะการแสดง">คณะนิเทศศาสตร์ - สาขาศิลปะการแสดง</option>
<option value="นิเทศศาสตร์|สาขาการผลิตอีเว้นท์และการจัดการนิทรรศการ">คณะนิเทศศาสตร์ - สาขาการผลิตอีเว้นท์และการจัดการนิทรรศการ</option>

<option value="บริหารธุรกิจ|สาขาการออกแบบและการบริหารแฟชั่น">คณะบริหารธุรกิจ - สาขาการออกแบบและการบริหารแฟชั่น</option>
<option value="บริหารธุรกิจ|สาขาการวางแผนการเงินและการลงทุน">คณะบริหารธุรกิจ - สาขาการวางแผนการเงินและการลงทุน</option>

<option value="ดิจิทัลมีเดียและศิลปะภาพยนตร์|สาขาภาพยนตร์">คณะดิจิทัลมีเดียและศิลปะภาพยนตร์ - สาขาภาพยนตร์</option>

<option value="จิตวิทยา|สาขาจิตวิทยา">คณะจิตวิทยา - สาขาจิตวิทยา</option>

<option value="แพทยศาสตร์|สาขาแพทย์ศาสตร์">คณะแพทยศาสตร์ - สาขาแพทย์ศาสตร์</option>
<option value="แพทยศาสตร์|สาขาสัตว์แพทย์">คณะแพทยศาสตร์ - สาขาสัตว์แพทย์</option>

</select>

<button onclick="apply()">สมัคร</button>

</div>
</div>

<!-- หน้ายืนยัน -->
<div id="resultPage" style="display:none">

<h1>ยืนยันสิทธิ์เรียบร้อยแล้ว</h1>
<div id="time"></div>

<div class="card">

<div class="check">✓</div>

<img src="logo.png" class="logo">

<p><b>มหาวิทยาลัยเทพนคร</b></p>
<p>ปทุมธานี</p>
<p>วิทยาเขตรังสิต</p>

<br>

<p id="major"></p>
<p id="facultyShow"></p>
<p>หลักสูตรระดับปริญญาตรี</p>
<p>หลักสูตรปกติ</p>
<p>โครงการรับตรง</p>

</div>

<div class="more" onclick="toggleInfo()">ข้อมูลเพิ่มเติม ▼</div>

<div class="extra" id="extra">
<p id="showName"></p>
<p id="showSchool"></p>
</div>

</div>

<script>

function apply(){

let name = document.getElementById("name").value
let school = document.getElementById("school").value
let faculty = document.getElementById("faculty").value

if(name==""||school==""||faculty==""){
alert("กรอกข้อมูลให้ครบ")
return
}

localStorage.setItem("name",name)
localStorage.setItem("school",school)
localStorage.setItem("faculty",faculty)

showResult()

}

function showResult(){

let name = localStorage.getItem("name")
let school = localStorage.getItem("school")
let faculty = localStorage.getItem("faculty")

if(!name) return

let data = faculty.split("|")

document.getElementById("formPage").style.display="none"
document.getElementById("resultPage").style.display="block"

document.getElementById("major").innerHTML=data[1]
document.getElementById("facultyShow").innerHTML="คณะ"+data[0]

document.getElementById("showName").innerHTML="ชื่อ - นามสกุล : "+name
document.getElementById("showSchool").innerHTML="สถานศึกษาเดิม : "+school

let now = new Date()
document.getElementById("time").innerHTML=now.toLocaleString("th-TH")+" น."

}

function toggleInfo(){

let box=document.getElementById("extra")

if(box.style.display==="block"){
box.style.display="none"
}else{
box.style.display="block"
}

}

showResult()

</script>

</body>
  </html>
